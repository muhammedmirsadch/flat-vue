{% extends 'Flat Owner/index.html' %}
{% load static %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
    /* === SAME PREMIUM DARK FUTURISTIC THEME === */
    .broadcast-container {
        padding: 60px 20px;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .broadcast-card {
        max-width: 600px;
        width: 100%;
        background: #1e1e1e;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        border: 1px solid #2a2a2a;
        position: relative;
    }

    .broadcast-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 5px;
        background: linear-gradient(90deg, #524dd3, #7b75ff);
        opacity: 0.9;
    }

    .broadcast-header {
        background: #111;
        padding: 30px 20px;
        text-align: center;
        border-bottom: 1px solid #2a2a2a;
    }

    .broadcast-header h3 {
        font-size: 2rem;
        font-weight: 700;
        color: #524dd3;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
    }

    .broadcast-body {
        padding: 50px 45px;
    }

    .form-label {
        color: #b0bec5;
        font-weight: 500;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form-control,
    .form-control[type="date"] {
        background: #111;
        border: 2px solid #333;
        color: #fff;
        padding: 16px 20px;
        border-radius: 14px;
        font-size: 1rem;
        transition: all 0.4s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .form-control:focus,
    .form-control[type="date"]:focus {
        border-color: #524dd3;
        background: #1a1a1a;
        color: #fff;
        box-shadow: 0 0 0 4px rgba(82, 77, 211, 0.3);
        outline: none;
    }

    .form-control::placeholder {
        color: #666;
        font-style: italic;
    }

    /* Styling for date input (modern look) */
    input[type="date"] {
        color-scheme: dark;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.8);
        cursor: pointer;
    }

    textarea.form-control {
        min-height: 130px;
        resize: vertical;
    }

    .btn-send {
        background: #524dd3;
        color: white;
        padding: 18px 40px;
        font-weight: 700;
        font-size: 1.3rem;
        border-radius: 16px;
        border: none;
        width: 100%;
        margin-top: 30px;
        transition: all 0.4s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
    }

    .btn-send:hover {
        background: #3d38a8;
        transform: translateY(-5px);
        color: black;
    }

    @media (max-width: 576px) {
        .broadcast-body {
            padding: 40px 30px;
        }
        .broadcast-header h3 {
            font-size: 1.7rem;
        }
        .btn-send {
            font-size: 1.1rem;
            padding: 16px 30px;
        }
    }
</style>

<div class="broadcast-container">
    <div class="broadcast-card">
        <div class="broadcast-header">
            <h3>Send Broadcast Notification</h3>
        </div>

        <div class="broadcast-body">
            <form action="/myapp/addbrdcastnotif_post/" method="post">
                {% csrf_token %}

                <!-- Date -->
                <div class="mb-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" value="{% now 'Y-m-d' %}" required>
                </div>

                <!-- Notification Title -->
                <div class="mb-4">
                    <label class="form-label">Notification Title</label>
                    <input type="text" name="notification" class="form-control"
                           placeholder="e.g., Maintenance Schedule, Meeting Alert, Festival Notice" required>
                </div>

                <!-- Details -->
                <div class="mb-4">
                    <label class="form-label">Details / Message</label>
                    <textarea name="details" class="form-control"
                              placeholder="Provide full details of the announcement..." required></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-send">
                    Send to All Residents
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
