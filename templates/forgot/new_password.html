<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        .reset-card {
            max-width: 500px;
            width: 100%;
            background: #1e1e1e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a2a2a;
            position: relative;
        }

        .reset-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #524dd3, #7b75ff);
            opacity: 0.9;
        }

        .reset-header {
            background: #111;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .reset-header h3 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #524dd3;
            margin: 0;
        }

        .reset-body {
            padding: 50px 40px;
        }

        .form-label {
            color: #b0bec5;
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        .form-control {
            background: #111;
            border: 2px solid #333;
            color: #fff;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 1rem;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .form-control:focus {
            border-color: #524dd3;
            background: #1a1a1a;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(82, 77, 211, 0.3);
            outline: none;
        }

        .input-group-text {
            background: #111;
            border: 2px solid #333;
            color: #94a3b8;
            cursor: pointer;
            border-left: none;
            border-radius: 0 14px 14px 0;
            padding: 0 16px;
        }

        .input-group .form-control {
            border-right: none;
            border-radius: 14px 0 0 14px;
        }

        .btn-reset {
            background: #524dd3;
            color: white;
            padding: 16px 40px;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 16px;
            border: none;
            width: 100%;
            margin-top: 30px;
            transition: all 0.4s ease;
        }

        .btn-reset:hover {
            background: #3d38a8;
            color: black;
            transform: translateY(-4px);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }

        @media (max-width: 576px) {
            .reset-body {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

<div class="reset-card">
    <div class="reset-header">
        <h3>Enter New Password</h3>
    </div>

    <div class="reset-body">
        <form action="/myapp/changePassword/" method="post">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <input type="password" name="newPassword" id="newPassword"
                           class="form-control" placeholder="Create strong password" required>
                    <span class="input-group-text" onclick="togglePass('newPassword', this)">
                        Show
                    </span>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <input type="password" name="confirmPassword" id="confirmPassword"
                           class="form-control" placeholder="Retype password" required>
                    <span class="input-group-text" onclick="togglePass('confirmPassword', this)">
                        Show
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-reset">
                Change Password
            </button>
        </form>

        {% include 'msgalert.html' %}
        {% block content %}{% endblock %}

        <div class="footer-text">
            Make sure your new password is strong and secure.
        </div>
    </div>
</div>

<script>
    function togglePass(fieldId, element) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            element.innerHTML = 'Hide';
        } else {
            field.type = 'password';
            element.innerHTML = 'Show';
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
