{% extends 'Flat Owner/index.html' %}
{% load static %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
    /* === Your Signature Dark Futuristic Theme === */
    .occupant-container {
        padding: 50px 20px;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #e0e0e0;
    }

    .occupant-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .occupant-header h2 {
        font-size: 2.6rem;
        font-weight: 700;
        color: #524dd3;
        margin-bottom: 10px;
    }

    .occupant-header p {
        color: #524dd3;
        font-size: 1.15rem;
    }

    .occupant-card {
        max-width: 900px;
        margin: 0 auto;
        background: #1e1e1e;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
        border: 1px solid #2a2a2a;
        position: relative;
    }

    .occupant-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(90deg, #524dd3, #524dd3);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .occupant-card:hover::before {
        opacity: 1;
    }

    .occupant-card-header {
        background: #111;
        padding: 22px 30px;
        text-align: center;
        border-bottom: 1px solid #2a2a2a;
    }

    .occupant-card-header h3 {
        font-size: 1.8rem;
        font-weight: 700;
        color: #524dd3;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .occupant-card-body {
        padding: 35px 40px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-label {
        color: #524dd3;
        font-weight: 500;
        font-size: 0.88rem;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .form-control,
    .form-select {
        background: #111;
        border: 2px solid #333;
        color: #524dd3;
        padding: 14px 18px;
        border-radius: 14px;
        font-size: 1rem;
        transition: all 0.4s ease;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: #524dd3;
        background: #1a1a1a;
        color: #524dd3;
        outline: none;
    }

    .form-control::placeholder {
        color: #666;
        font-style: italic;
    }

    .form-control-file {
        background: #111;
        border: 2px solid #333;
        color: #524dd3;
        padding: 12px 18px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.4s ease;
    }

    .form-control-file:focus {
        border-color: #524dd3;
        background: #1a1a1a;
        box-shadow: 0 0 0 3px rgba(82, 77, 211, 0.25);
    }

    .form-control-file::-webkit-file-upload-button {
        background: #524dd3;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        margin-right: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    .form-control-file::-webkit-file-upload-button:hover {
        background: #3d38a8;
    }

    .btn-add-occupant {
        background: #524dd3;
        color: black;
        padding: 16px 40px;
        font-weight: 700;
        font-size: 1.2rem;
        border-radius: 16px;
        border: none;
        width: 100%;
        margin-top: 20px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .btn-add-occupant:hover {
        color: black;
        background: #524dd3;
        transform: translateY(-3px);
    }

    @media (max-width: 768px) {
        .occupant-card-body {
            padding: 25px 20px;
        }

        .occupant-header h2 {
            font-size: 2.2rem;
        }

        .form-control, .form-select, .form-control-file {
            font-size: 0.95rem;
            padding: 12px 16px;
        }
    }
</style>

<div class="occupant-container">
    <div class="occupant-header">
        <h2>Add Flat Occupant</h2>
        <p>Register new residents with full details and access</p>
    </div>

    <div class="occupant-card">
        <div class="occupant-card-header">
            <h3><i class="bi bi-person-plus-fill"></i> Occupant Registration</h3>
        </div>

        <div class="occupant-card-body">
            <form action="/myapp/addflatoccu_post/" method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row g-4">
                    <!-- Name -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-person-circle"></i> Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-envelope"></i> E-mail</label>
                            <input type="email" name="email" class="form-control" placeholder="example@domain.com" required>
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-phone"></i> Phone</label>
                            <input type="text" name="phone" class="form-control" placeholder="+91 9876543210" pattern="[0-9+\-\s]{10,15}" required>
                        </div>
                    </div>

                    <!-- Place -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-geo-alt"></i> Place</label>
                            <input type="text" name="place" class="form-control" placeholder="e.g., Kochi" required>
                        </div>
                    </div>

                    <!-- District -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-building"></i> District</label>
                            <input type="text" name="district" class="form-control" placeholder="e.g., Ernakulam" required>
                        </div>
                    </div>

                    <!-- Flat Selection -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-house-door"></i> Flat Number</label>
                            <select name="flat" class="form-select" required>
                                <option value="" disabled selected>Select Flat</option>
                                {% for i in data %}
                                    <option value="{{ i.id }}">{{ i.flatnumber }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Profile Image -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-image"></i> Profile Image</label>
                            <input type="file" name="image" class="form-control-file" accept="image/*" required>
                        </div>
                    </div>

                    <!-- ID Proof -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-file-earmark-check"></i> ID Proof</label>
                            <input type="file" name="Proof" class="form-control-file" accept=".pdf,.jpg,.jpeg,.png" required>
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-person-badge"></i> Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Create strong password" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-add-occupant">
                    <i class="bi bi-person-check-fill"></i> Add Occupant
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
