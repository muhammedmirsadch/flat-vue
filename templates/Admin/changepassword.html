{% extends 'Admin/adminindex.html' %}
{% load static %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
    /* === SAME PREMIUM DARK FUTURISTIC THEME === */
    .changepass-container {
        padding: 80px 20px;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .changepass-card {
        max-width: 500px;
        width: 100%;
        background: #1e1e1e;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        border: 1px solid #2a2a2a;
        position: relative;
    }

    .changepass-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 5px;
        background: linear-gradient(90deg, #524dd3, #7b75ff);
        opacity: 0.9;
    }

    .changepass-header {
        background: #111;
        padding: 30px 20px;
        text-align: center;
        border-bottom: 1px solid #2a2a2a;
    }

    .changepass-header h3 {
        font-size: 1.9rem;
        font-weight: 700;
        color: #524dd3;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
    }

    .changepass-body {
        padding: 50px 40px;
    }

    .form-label {
        color: #b0bec5;
        font-weight: 500;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form-control {
        background: #111;
        border: 2px solid #333;
        color: #fff;
        padding: 16px 20px;
        border-radius: 14px;
        font-size: 1rem;
        transition: all 0.4s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .form-control:focus {
        border-color: #524dd3;
        background: #1a1a1a;
        color: #fff;
        box-shadow: 0 0 0 4px rgba(82, 77, 211, 0.3);
        outline: none;
    }

    .form-control::placeholder {
        color: #666;
        font-style: italic;
    }

    .input-group-text {
        background: #111;
        border: 2px solid #333;
        color: #94a3b8;
        cursor: pointer;
        border-left: none;
        border-radius: 0 14px 14px 0;
        padding: 0 16px;
    }

    .input-group .form-control {
        border-right: none;
        border-radius: 14px 0 0 14px;
    }

    .btn-change {
        background: #524dd3;
        color: white;
        padding: 16px 40px;
        font-weight: 700;
        font-size: 1.2rem;
        border-radius: 16px;
        border: none;
        width: 100%;
        margin-top: 30px;
        transition: all 0.4s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
    }

    .btn-change:hover {
        background: #3d38a8;
        color: black;
        transform: translateY(-4px);
    }

    @media (max-width: 576px) {
        .changepass-body {
            padding: 40px 25px;
        }
        .changepass-header h3 {
            font-size: 1.6rem;
        }
    }
</style>

<div class="changepass-container">
    <div class="changepass-card">
        <div class="changepass-header">
            <h3>Change Password</h3>
        </div>

        <div class="changepass-body">
            <form action="/myapp/changepass_post/" method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">Current Password</label>
                    <div class="input-group">
                        <input type="password" name="current_password" id="current_pass" class="form-control" placeholder="Enter current password" required>
                        <span class="input-group-text" onclick="togglePass('current_pass', this)">
                            Show
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" name="new_password" id="new_pass" class="form-control" placeholder="Create strong new password" required>
                        <span class="input-group-text" onclick="togglePass('new_pass', this)">
                            Show
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-group">
                        <input type="password" name="confirm_password" id="confirm_pass" class="form-control" placeholder="Retype new password" required>
                        <span class="input-group-text" onclick="togglePass('confirm_pass', this)">
                            Show
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn-change">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function togglePass(fieldId, icon) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            icon.innerHTML = 'Hide';
        } else {
            field.type = 'password';
            icon.innerHTML = 'Show';
        }
    }
</script>

{% endblock %}
