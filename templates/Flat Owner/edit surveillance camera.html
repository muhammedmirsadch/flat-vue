{% extends 'Flat Owner/index.html' %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
.cameraedit-container {
    padding: 60px 20px;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cameraedit-card {
    max-width: 580px;
    width: 100%;
    background: #1e1e1e;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    border: 1px solid #2a2a2a;
    position: relative;
}

.cameraedit-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #524dd3, #7b75ff);
    opacity: 0.9;
}

.cameraedit-header {
    background: #111;
    padding: 30px 20px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
}

.cameraedit-header h3 {
    font-size: 2rem;
    font-weight: 700;
    color: #524dd3;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
}

.cameraedit-body {
    padding: 50px 45px;
}

.form-label {
    color: #b0bec5;
    font-weight: 500;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
}

.form-control {
    background: #111;
    border: 2px solid #333;
    color: #fff;
    padding: 16px 20px;
    border-radius: 14px;
    font-size: 1rem;
    transition: all 0.4s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.form-control:focus {
    border-color: #524dd3;
    background: #1a1a1a;
    color: #fff;
    box-shadow: 0 0 0 4px rgba(82,77,211,0.3);
    outline: none;
}

textarea.form-control {
    min-height: 120px;
    resize: vertical;
}

.btn-update-camera {
    background: #524dd3;
    color: white;
    padding: 16px 35px;
    font-weight: 700;
    font-size: 1.2rem;
    border-radius: 16px;
    border: none;
    width: 100%;
    margin-top: 25px;
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.btn-update-camera:hover {
    background: #3d38a8;
    color: black;
    transform: translateY(-3px);
}

@media (max-width: 576px) {
    .cameraedit-body {
        padding: 40px 30px;
    }
    .cameraedit-header h3 {
        font-size: 1.7rem;
    }
    .btn-update-camera {
        font-size: 1.1rem;
        padding: 14px 25px;
    }
}
</style>

<div class="cameraedit-container">
    <div class="cameraedit-card">
        <div class="cameraedit-header">
            <h3>Edit Surveillance Camera</h3>
        </div>
        <div class="cameraedit-body">
            <form action="/myapp/editcamera_post/" method="post">
                {% csrf_token %}

                <!-- Camera Number -->
                <div class="mb-4">
                    <label class="form-label">Camera Number / ID</label>
                    <input type="text" name="camerano" class="form-control" value="{{ i.camera_no }}" required>
                </div>

                <!-- Location -->
                <div class="mb-4">
                    <label class="form-label">Installation Location</label>
                    <input type="text" name="location" class="form-control" value="{{ i.location }}" required>
                </div>

                <!-- Details -->
                <div class="mb-4">
                    <label class="form-label">Details / Specifications</label>
                    <textarea name="details" class="form-control">{{ i.details }}</textarea>
                </div>

                <button type="submit" class="btn-update-camera">
                    Update Camera
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
