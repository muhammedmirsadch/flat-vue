{% extends 'Service Provider/index.html' %}
{% load static %}
{% block body %}

<head>
    <title>Manage Ongoing Services</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #0c0c0c;
            color: #00e1b6;
            font-family: "Poppins", sans-serif;
        }

        .table-box {
            border: 1px solid rgba(0, 255, 200, 0.35);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0px 0px 16px rgba(0, 255, 200, 0.25);
        }

        th {
            background: rgba(0, 255, 200, 0.12);
            color: #00e1b6;
            font-weight: 600;
            text-transform: uppercase;
        }

        td {
            background: #111;
            color: #dcdcdc;
        }

        tr:hover td {
            background: rgba(0, 255, 200, 0.08);
        }

        .update-btn {
            background: #00c2a4;
            color: white;
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .update-btn:hover {
            background: #00c2a4;
            color: black;
        }
    </style>
</head>

<body>
    <br><br>

    <center>
        <h2 class="fw-bold text-uppercase">
            <i class="bi bi-tools"></i> Ongoing Services
        </h2>
        <p style="opacity: 0.7;">Track and update your current services</p>
    </center>

    <div class="container mt-4">

        <div class="table-responsive table-box">
            <table class="table table-bordered table-dark table-striped mb-0 text-center">
                <thead>
                    <tr>
                        <th>Service</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for i in data %}
                    <tr>
                        <td>{{ i.service }}</td>
                        <td>{{ i.date }}</td>
                        <td>{{ i.status }}</td>
                        <td>
                            <a href="/myapp/service_provider_update_ongoing_services/{{ i.id }}/"
                               class="update-btn">
                                Update
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

    <br><br>
</body>

{% endblock %}
