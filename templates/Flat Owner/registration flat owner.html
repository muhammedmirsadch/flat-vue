<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up - Flat Owner</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Lato Font -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #e0e0e0;
        }

        .signup-card {
            background: #16213e;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            max-width: 480px;
            border: 1px solid #2a3453;
        }

        .form-control, .form-select {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            height: 52px;
            border-radius: 12px;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-control:focus {
            background-color: #1e293b;
            border-color: #6366f1;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.3);
            color: #e2e8f0;
        }

        .form-control-file {
            background-color: #1e293b;
            border: 1px dashed #334155;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 12px;
        }

        .btn-signup {
            background: #6366f1;
            border: none;
            height: 52px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .btn-signup:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        a {
            color: #a5b4fc;
            text-decoration: none;
        }

        a:hover {
            color: #c3d1ff;
        }

        .login-link {
            color: #94a3b8;
        }

        .login-link a {
            color: #a5b4fc;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">

                <!-- Title -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-white">Create Account</h2>
                    <p class="text-muted">Register as a Flat Owner</p>
                </div>

                <!-- Sign Up Card -->
                <div class="signup-card mx-auto">
                    <form action="/myapp/regflatowner_post/" method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row g-3">
                            <!-- Name -->
                            <div class="col-12">
                                <input type="text" class="form-control" placeholder="Full Name" name="name" required>
                            </div>

                            <!-- Email -->
                            <div class="col-12">
                                <input type="email" class="form-control" placeholder="Email Address" name="email" required>
                            </div>

                            <!-- Phone -->
                            <div class="col-12">
                                <input type="text" class="form-control" placeholder="Phone Number" name="phone" required>
                            </div>

                            <!-- Place -->
                            <div class="col-12">
                                <input type="text" class="form-control" placeholder="Place / City" name="place" required>
                            </div>

                            <!-- Proof Upload -->
                            <div class="col-12">
                                <label class="form-label text-light mb-2">ID Proof (Aadhaar/Passport etc.)</label>
                                <input type="file" class="form-control form-control-file" name="proof" required>
                            </div>

                            <!-- Profile Image -->
                            <div class="col-12">
                                <label class="form-label text-light mb-2">Profile Image (Optional)</label>
                                <input type="file" class="form-control form-control-file" name="image" accept="image/*">
                            </div>

                            <!-- Username -->
                            <div class="col-12">
                                <input type="text" class="form-control" placeholder="Choose Username" name="username" required>
                            </div>

                            <!-- Password with toggle -->
                            <div class="col-12">
                                <div class="input-group">
                                    <input id="password-field" type="password" class="form-control" placeholder="Create Password" name="password" required>
                                    <span class="input-group-text" onclick="togglePassword()">
                                        <i class="fa fa-eye" id="eyeIcon"></i>
                                    </span>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-signup text-white w-100">Register</button>
                            </div>

                            <!-- Login Link -->
                            <div class="col-12 text-center mt-3">
                                <p class="login-link">
                                    Already have an account?
                                    <a href="/myapp/login_load/">Login here</a>
                                </p>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap + Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const field = document.getElementById('password-field');
            const icon = document.getElementById('eyeIcon');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
