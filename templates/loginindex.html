<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Dark Theme</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Lato Font -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #e0e0e0;
        }

        .login-card {
            background: #16213e;            /* Dark blue-gray card */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            max-width: 420px;
            border: 1px solid #2a3453;
        }

        .form-control {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            height: 52px;
            border-radius: 12px;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-control:focus {
            background-color: #1e293b;
            border-color: #6366f1;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.3);
            color: #e2e8f0;
        }

        .input-group-text {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            cursor: pointer;
        }

        .btn-login {
            background: #6366f1;             /* Indigo/Purple accent */
            border: none;
            height: 52px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .btn-login:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        a {
            color: #a5b4fc;
            text-decoration: none;
        }

        a:hover {
            color: #c3d1ff;
        }

        .or-divider {
            color: #64748b;
        }

        .signup-btn {
            background: #3b5998;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .signup-btn:hover {
            background: #2f477a;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <!-- Title above card -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-white">Login</h2>
                </div>

                <!-- Login Card -->
                <div class="login-card mx-auto">
                    <h4 class="text-center mb-4 text-light">Have an account?</h4>

                    <form action="/myapp/login_post/" method="post" enctype="multipart/form-data">
                        <!-- Username -->
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Username" name="Username" required>
                        </div>

                        <!-- Password with toggle -->
                        <div class="mb-4">
                            <div class="input-group">
                                <input id="password-field" type="password" class="form-control" placeholder="Password" name="password" required>
                                <span class="input-group-text" onclick="togglePassword()">
                                    <i class="fa fa-eye" id="eyeIcon"></i>
                                </span>
                            </div>
                        </div>

                        <!-- Remember + Forgot -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" checked>
                                <label class="form-check-label text-light" for="remember">
                                    Remember Me
                                </label>
                            </div>
                            <a href="/myapp/forgot_password/">Forgot Password?</a>
                        </div>

                        <!-- Sign In Button -->
                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-login text-white">Login</button>
                        </div>

                        <!-- Divider -->
                        <div class="text-center or-divider mb-4">— Or Sign Up —</div>

                        <!-- Sign Up Button -->
                        <div class="text-center">
                            <a href="/myapp/flat_owner_reg_flat_owner/" class="signup-btn">
                                 Sign Up
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword() {
            const field = document.getElementById('password-field');
            const icon = document.getElementById('eyeIcon');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
