<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    /* Card Style (Same as Change Password) */
    .forgot-card {
      max-width: 480px;
      width: 100%;
      background: #1e1e1e;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid #2a2a2a;
      position: relative;
      overflow: hidden;
    }

    .forgot-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #524dd3, #7b75ff);
    }

    .forgot-header {
      background: #111;
      padding: 30px 20px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .forgot-header h4 {
      color: #524dd3;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .forgot-body {
      padding: 40px 35px;
    }

    .form-label {
      color: #b0bec5;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
    }

    .form-control {
      background: #111;
      border: 2px solid #333;
      color: #fff;
      padding: 14px 18px;
      border-radius: 14px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: #524dd3;
      background: #1a1a1a;
      box-shadow: 0 0 0 4px rgba(82, 77, 211, 0.3);
      color: #fff;
    }

    .form-control::placeholder {
      color: #666;
    }

    .btn-theme {
      background: #524dd3;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      width: 100%;
      margin-top: 20px;
    }

    .btn-theme:hover {
      background: #3d38a8;
      transform: translateY(-3px);
      color: #000;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #444;
      color: #ccc;
      border-radius: 16px;
      padding: 14px;
      width: 100%;
      margin-top: 10px;
    }

    .btn-cancel:hover {
      background: #222;
    }

    @media (max-width: 576px) {
      .forgot-body {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

<div class="forgot-card">
  <div class="forgot-header">
    <h4>
      <i class="bi bi-shield-lock"></i> Forgot Password
    </h4>
  </div>

  <div class="forgot-body">
    <form action="/myapp/forgotPassword_otp/" method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email"
               name="email"
               class="form-control"
               placeholder="Enter your registered email"
               required>
      </div>

      <button type="submit" class="btn-theme">
        Send OTP
      </button>

      <button type="button" onclick="history.back()" class="btn-cancel">
        Cancel
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
